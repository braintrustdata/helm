# Global configs
global:
  orgName: "<your org name on Braintrust>"
  # Required when orgName is empty or "*" unless PRIMARY_ORG_NAME is supplied
  # via api.extraEnvVars. Used to authorize self-hosted service-token management.
  primaryOrgName: ""
  # Optional comma-separated Braintrust Org ID allowlist (IDs, not org names).
  # Do not include spaces. If orgName is a specific name, that org is included
  # in the allowlist; include its Braintrust Org ID here for forward compatibility.
  allowedOrgIds: ""
  # When createNamespace is true, the namespace will be created and resources will be in global.namespace
  # When createNamespace is false, resources will use .Release.Namespace (the namespace specified during helm install/upgrade)
  createNamespace: false
  namespace: "braintrust"
  namespaceAnnotations: {}
  labels: {}
  # Control plane telemetry configuration (applies to API, Brainstore, and AI Gateway)
  # Available options (comma-separated):
  #   - status: Health check information (default)
  #   - metrics: System metrics (CPU/memory) and Braintrust-specific metrics like indexing lag (default)
  #   - usage: Billing usage telemetry for aggregate usage metrics
  #   - memprof: Memory profiling statistics and heap usage patterns
  #   - logs: Application logs
  #   - traces: Distributed tracing data
  # NOTE: If you previously configured BRAINSTORE_CONTROL_PLANE_TELEMETRY or CONTROL_PLANE_TELEMETRY
  # as extraEnvVars, you can remove those entries and use this global setting instead.
  # ExtraEnvVars values will override this global setting if both are present.
  controlPlaneTelemetry: "status,metrics,usage"

# Cloud provider configuration
cloud: ""  # "google" or "azure" or "aws"

# Optional: Google Cloud specific configuration
google:
  # GKE mode: "autopilot" or "standard"
  # When "autopilot": Automatically configures node selectors for local SSDs
  # When "standard": Uses default emptyDir (assumes nodes have local SSDs if configured)
  mode: "autopilot"  # Set to "autopilot" for GKE Autopilot and "standard" for GKE with manual node pools
  # Machine family for Autopilot mode (used when mode is "autopilot") Must be a machine family that supports local SSDs
  autopilotMachineFamily: "c4"

azure:
  tenantId: ""
  # Automatically configures NVMe temporary disks into a single RAID0 volume. It should always be enabled except in rare cases.
  # https://learn.microsoft.com/en-us/azure/storage/container-storage/container-storage-introduction
  enableAzureContainerStorageDriver: true
  # Azure Key Vault driver configuration for syncing secrets from Azure Key Vault
  enableAzureKeyVaultDriver: true
  # This is the client ID of the service principal that has access to the keyvault.
  keyVaultCSIclientID: ""
  # This should come from the terraform module
  keyVaultName: ""


objectStorage:
  # Azure specific configuration
  azure:
    # This should come from the terraform module
    storageAccountName: ""
    # These are the default container names used by the terraform module
    brainstoreContainer: "brainstore"
    responseContainer: "responses"
    codeBundleContainer: "code-bundles"

  # AWS specific configuration
  aws:
    # This should come from the terraform module
    brainstoreBucket: ""
    responseBucket: ""
    codeBundleBucket: ""

  google:
    # This should come from the terraform module
    brainstoreBucket: ""
    # Single API bucket with paths for responses and code bundles
    apiBucket: ""

# No-PG mode: controls which object types bypass PostgreSQL and use Brainstore directly.
# Options:
#   - "all" (default): skip PostgreSQL for all object types
#   - "": disabled, PostgreSQL used as normal
#   - "include:<type>:<uuid>,...": skip for specific objects only
#   - "exclude:<type>:<uuid>,...": skip for all objects except specific ones
skipPgForBrainstoreObjects: "all"

# WAL footer version controls the format of WAL entries written by Brainstore.
# Progression: "" (disabled) -> "v1" (on 1.1.32) -> "v3" (on 2.0)
brainstoreWalFooterVersion: "v3"

api:
  name: "braintrust-api"
  labels: {}
  podLabels: {}
  annotations:
    configmap: {}
    deployment: {}
    service: {}
    pod: {}
    serviceaccount: {}
  replicas: 4
  image:
    repository: public.ecr.aws/braintrust/standalone-api
    tag: v2.7.1
    pullPolicy: IfNotPresent
  service:
    # Optional name for service object. If not specified (empty), the api.name
    # is used.
    name: ""
    type: ClusterIP
    port: 8000
    portName: http
  serviceAccount:
    name: "braintrust-api"
    awsRoleArn: ""
    azureClientId: ""
    googleServiceAccount: ""
  # Enable native GCS authentication via workload identity (defaults to false for S3-compatible access)
  enableGcsAuth: false
  resources:
    requests:
      cpu: "2"
      memory: "4Gi"
    limits:
      cpu: "4"
      memory: "8Gi"
  tmpVolume:
    enabled: false
    sizeLimit: ""
  # Allow running user generated code functions (e.g. scorers/tools)
  allowCodeFunctionExecution: false
  # Brainstore backfill configuration. These defaults are fine for most cases.
  backfillDisableHistorical: false
  backfillDisableNonhistorical: false
  allowInvalidBase64: false  # By default, we will error on invalid base64 strings. Setting this to true will allow invalid base64 strings to be processed.
  nodeMemoryPercent: "80"
  # Controls how Braintrust backends handle outbound requests to user-supplied URLs
  # that fail URL-security checks, such as URLs resolving to private or reserved IP
  # ranges. Applies to the API and AI Gateway when configured. Use "off" to allow,
  # "proxy" to proxy, "warn" to allow with warnings, or "reject" to block. Leave
  # empty to use the application default of "warn".
  unsafeUrlRequestMode: ""
  # Comma-separated DNS resolver IP addresses Braintrust backends should query when
  # checking user-supplied URLs. Set this to force URL-security validation through
  # trusted resolvers, such as VNet or corporate DNS, before falling back to the host
  # resolver. Leave empty to use the application default resolver behavior.
  urlSecurityDnsServers: ""
  # Optional comma-separated CIDR ranges that Braintrust backend URL-security
  # validation may allow even if private or reserved. Hard-blocked metadata,
  # link-local, multicast, unspecified, and future-use ranges remain blocked.
  urlSecurityAllowCidrs: ""
  extraEnvVars:
    # Example:
    # - name: MY_ENV_VAR
    #   value: "my-value"
    # - name: ANOTHER_VAR
    #   value: "another-value"
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # Health check probes
  livenessProbe:
    httpGet:
      path: /
      port: 8000
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1
  readinessProbe:
    httpGet:
      path: /
      port: 8000
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1
  # Health server configuration
  healthServer:
    host: "0.0.0.0"
    port: "8001"
  extraContainers: []
  extraVolumes: []

# AI Gateway configuration (optional)
# Deploys the Braintrust AI gateway service for LLM proxying and completions caching.
# Recommended rollout: enabled=true first, wait for gateway pods to be ready, then useGateway=true.
aiGateway:
  enabled: false
  # Sets GATEWAY_URL on the API to route requests through the AI Gateway. Requires enabled=true.
  useGateway: false
  name: "braintrust-ai-gateway"
  labels: {}
  podLabels: {}
  annotations:
    configmap: {}
    deployment: {}
    service: {}
    pod: {}
  replicas: 2
  image:
    repository: public.ecr.aws/braintrust/gateway
    tag: v2.7.1
    pullPolicy: IfNotPresent
  service:
    # Optional name for service object. If not specified (empty), aiGateway.name is used.
    name: ""
    type: ClusterIP
    port: 8080
    portName: http
  # Optional cloud region identifier (e.g. us-east-1). Sets GATEWAY_REGION when provided.
  region: ""
  braintrustAppUrl: "https://www.braintrust.dev"
  # Defaults to the in-cluster API service URL when empty.
  braintrustApiUrl: ""
  resources:
    requests:
      cpu: "2"
      memory: "4Gi"
    limits:
      cpu: "2"
      memory: "4Gi"
  livenessProbe:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1
  readinessProbe:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1
  extraEnvVars: []
  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraContainers: []
  extraVolumes: []

# Brainstore configuration (split into reader/fastreader/writer)
brainstore:
  # Shared configuration
  labels: {}
  serviceAccount:
    name: "brainstore"
    awsRoleArn: ""
    azureClientId: ""
    googleServiceAccount: ""
    annotations: {}
  # Shared image configuration
  image:
    repository: public.ecr.aws/braintrust/brainstore
    tag: v2.7.1
    pullPolicy: IfNotPresent
  # Locks backend configuration
  # Options: "redis" (default) or "objectStorage"
  # When "redis": Uses Redis for distributed locks (REDIS_URL must be configured in secrets)
  # When "objectStorage": Uses cloud object storage for distributed locks
  # WARNING: If you have an existing deployment, DO NOT change this setting.
  # Changing the locks backend on an existing deployment could cause data corruption at this time.
  locksBackend: "redis"
  # Health check probes (applies to both reader and writer)
  livenessProbe:
    httpGet:
      path: /
      port: 4000
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1
  readinessProbe:
    httpGet:
      path: /
      port: 4000
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1
  # Brainstore Reader configuration
  reader:
    name: "brainstore-reader"
    labels: {}
    podLabels: {}
    annotations:
      configmap: {}
      deployment: {}
      service: {}
      pod: {}
    replicas: 2
    service:
      name: ""
      type: ClusterIP
      port: 4000
      portName: http
    resources:
      requests:
        cpu: "16"
        memory: "32Gi"
      limits:
        cpu: "16"
        memory: "32Gi"
    cacheDir: "/mnt/tmp/brainstore"
    objectStoreCacheMemoryLimit: "1Gi"
    objectStoreCacheFileSize: "1000Gi"
    verbose: true
    # Optional: Volume configuration for cache storage
    # When not set, uses default emptyDir: {} (backward compatible)
    volume:
      # Storage size for ephemeral storage requests (used with GKE Autopilot local SSDs)
      size: ""
      # Optional emptyDir size limit for CEL policy compliance
      sizeLimit: ""
    ephemeralStorage:
      # Total pod-local storage budget for ephemeral-storage requests.
      # Size this for cache emptyDir, optional /tmp emptyDir, and writable layer/log overhead.
      # On GKE Autopilot, volume.size is still used as the fallback request when this is unset.
      request: ""
      # Optional total pod-local storage limit.
      limit: ""
    tmpVolume:
      enabled: false
      sizeLimit: ""
    extraEnvVars: []
    nodeSelector: {}
    tolerations: []
    affinity: {}
    extraContainers: []
    extraVolumes: []

  # Brainstore Fast Reader configuration
  fastreader:
    name: "brainstore-fastreader"
    labels: {}
    podLabels: {}
    annotations:
      configmap: {}
      deployment: {}
      service: {}
      pod: {}
    replicas: 2
    service:
      name: ""
      type: ClusterIP
      port: 4000
      portName: http
    resources:
      requests:
        cpu: "16"
        memory: "32Gi"
      limits:
        cpu: "16"
        memory: "32Gi"
    cacheDir: "/mnt/tmp/brainstore"
    objectStoreCacheMemoryLimit: "1Gi"
    objectStoreCacheFileSize: "1000Gi"
    verbose: true
    # Optional: Volume configuration for cache storage
    # When not set, uses default emptyDir: {} (backward compatible)
    volume:
      # Storage size for ephemeral storage requests (used with GKE Autopilot local SSDs)
      size: ""
      # Optional emptyDir size limit for CEL policy compliance
      sizeLimit: ""
    ephemeralStorage:
      # Total pod-local storage budget for ephemeral-storage requests.
      # Size this for cache emptyDir, optional /tmp emptyDir, and writable layer/log overhead.
      # On GKE Autopilot, volume.size is still used as the fallback request when this is unset.
      request: ""
      # Optional total pod-local storage limit.
      limit: ""
    tmpVolume:
      enabled: false
      sizeLimit: ""
    extraEnvVars: []
    nodeSelector: {}
    tolerations: []
    affinity: {}
    extraContainers: []
    extraVolumes: []

  # Brainstore Writer configuration
  writer:
    name: "brainstore-writer"
    labels: {}
    podLabels: {}
    annotations:
      configmap: {}
      deployment: {}
      service: {}
      pod: {}
    replicas: 1
    service:
      name: ""
      type: ClusterIP
      port: 4000
      portName: http
    resources:
      requests:
        cpu: "32"
        memory: "64Gi"
      limits:
        cpu: "32"
        memory: "64Gi"
    cacheDir: "/mnt/tmp/brainstore"
    objectStoreCacheMemoryLimit: "1Gi"
    objectStoreCacheFileSize: "1000Gi"
    verbose: true
    # Optional: Volume configuration for cache storage
    # When not set, uses default emptyDir: {} (backward compatible)
    volume:
      # Storage size for ephemeral storage requests
      # Used with GKE Autopilot local SSDs and Azure Container Storage CSI
      size: ""
      # Optional emptyDir size limit for CEL policy compliance
      sizeLimit: ""
    ephemeralStorage:
      # Total pod-local storage budget for ephemeral-storage requests.
      # Size this for cache emptyDir, optional /tmp emptyDir, and writable layer/log overhead.
      # On GKE Autopilot, volume.size is still used as the fallback request when this is unset.
      request: ""
      # Optional total pod-local storage limit.
      limit: ""
    tmpVolume:
      enabled: false
      sizeLimit: ""
    extraEnvVars: []
    # Example:
    # - name: MY_ENV_VAR
    #   value: "my-value"
    # - name: ANOTHER_VAR
    #   value: "another-value"
    nodeSelector: {}
    tolerations: []
    affinity: {}
    extraContainers: []
    extraVolumes: []

azureKeyVaultDriver:
  # Map your Key Vault secret names to the required Kubernetes secret keys
  # Example: If your Redis URL is stored as "my-redis-connection" in Key Vault, set:
  #   keyVaultSecretName: "my-redis-connection"
  #   kubernetesSecretKey: "REDIS_URL"
  # These defaults assume you are using the Braintrust terraform module to deploy the base infrastructure
  secrets:
    - keyVaultSecretName: "redis-connection-string"
      keyVaultSecretType: "secret"
      kubernetesSecretKey: "REDIS_URL"
    - keyVaultSecretName: "postgres-connection-string"
      kubernetesSecretKey: "PG_URL"
      keyVaultSecretType: "secret"
    - keyVaultSecretName: "brainstore-license-key"
      keyVaultSecretType: "secret"
      kubernetesSecretKey: "BRAINSTORE_LICENSE_KEY"
    - keyVaultSecretName: "function-secret-key"
      keyVaultSecretType: "secret"
      kubernetesSecretKey: "FUNCTION_SECRET_KEY"
    - keyVaultSecretName: "azure-storage-connection-string"
      keyVaultSecretType: "secret"
      kubernetesSecretKey: "AZURE_STORAGE_CONNECTION_STRING"

# Istio VirtualService configuration (optional)
# Enable this to create an Istio VirtualService for the API
virtualService:
  enabled: false
  name: ""  # If empty, defaults to "<api.name>-vs"
  labels: {}
  annotations: {}
  # List of gateway names (can include namespace, e.g., "istio-ingress/asm-gateway")
  gateways:
    - "istio-gateway"
  # List of hosts/domains
  hosts:
    - "braintrust.example.com"
  # HTTP routing rules
  # The destination host will use api.service.name (or api.name if service.name is empty)
  # The destination port will use api.service.port (default: 8000)
  http:
    - match:
        - uri:
            prefix: "/"
      route:
        - destination:
            host: "braintrust-api"  # Should match api.service.name or api.name
            port:
              number: 8000  # Should match api.service.port
