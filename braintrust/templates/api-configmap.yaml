{{- $orgName := .Values.global.orgName | default "" | toString | trim -}}
{{- $primaryOrgName := .Values.global.primaryOrgName | default "" | toString | trim -}}
{{- $hasPrimaryOrgNameExtraEnv := false -}}
{{- range .Values.api.extraEnvVars -}}
{{- if eq (.name | default "" | toString) "PRIMARY_ORG_NAME" -}}
{{- $hasPrimaryOrgNameExtraEnv = true -}}
{{- end -}}
{{- end -}}
{{- if and (or (eq $orgName "") (eq $orgName "*")) (eq $primaryOrgName "") (not $hasPrimaryOrgNameExtraEnv) -}}
{{- fail "global.primaryOrgName or api.extraEnvVars PRIMARY_ORG_NAME is required when global.orgName is empty or \"*\"; self-hosted service-token management needs a primary organization." -}}
{{- end -}}
{{- $allowedOrgIds := .Values.global.allowedOrgIds | default "" | toString | trim -}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.api.name }}
  namespace: {{ include "braintrust.namespace" . }}
  {{- with (merge (deepCopy .Values.api.labels) .Values.global.labels) }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.api.annotations.configmap }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  ORG_NAME: {{ $orgName | quote }}
  PRIMARY_ORG_NAME: {{ $primaryOrgName | quote }}
  # emit v3 spans in py+ts sdks. remove this setting when v4 migration is complete
  BRAINTRUST_LEGACY_IDS: "true"
  {{- with $allowedOrgIds }}
  ALLOWED_ORG_IDS: {{ . | quote }}
  {{- end }}

  {{- if eq .Values.cloud "azure" }}
  AZURE_STORAGE_ACCOUNT_NAME: {{ .Values.objectStorage.azure.storageAccountName | quote }}
  RESPONSE_BUCKET: {{ .Values.objectStorage.azure.responseContainer | quote }}
  CODE_BUNDLE_BUCKET: {{ .Values.objectStorage.azure.codeBundleContainer | quote }}
  BRAINSTORE_REALTIME_WAL_BUCKET: {{ .Values.objectStorage.azure.brainstoreContainer | quote }}
  BRAINSTORE_REALTIME_WAL_BUCKET_PREFIX: "brainstore/wal"
  {{- else if eq .Values.cloud "aws" }}
  RESPONSE_BUCKET: {{ .Values.objectStorage.aws.responseBucket | quote }}
  CODE_BUNDLE_BUCKET: {{ .Values.objectStorage.aws.codeBundleBucket | quote }}
  BRAINSTORE_REALTIME_WAL_BUCKET: {{ .Values.objectStorage.aws.brainstoreBucket | quote }}
  {{- else if eq .Values.cloud "google" }}
  RESPONSE_BUCKET: {{ .Values.objectStorage.google.apiBucket | quote }}
  RESPONSE_BUCKET_PREFIX: "response/"
  CODE_BUNDLE_BUCKET: {{ .Values.objectStorage.google.apiBucket | quote }}
  CODE_BUNDLE_BUCKET_PREFIX: "code-bundle/"
  BRAINSTORE_REALTIME_WAL_BUCKET: {{ .Values.objectStorage.google.brainstoreBucket | quote }}
  {{- if .Values.api.enableGcsAuth }}
  ENABLE_GCS_AUTH: "true"
  {{- else }}
  AWS_ENDPOINT_URL: "https://storage.googleapis.com"
  AWS_REQUEST_CHECKSUM_CALCULATION: "WHEN_REQUIRED"
  AWS_RESPONSE_CHECKSUM_VALIDATION: "WHEN_REQUIRED"
  {{- end }}
  {{- end }}

  ALLOW_CODE_FUNCTION_EXECUTION: {{ .Values.api.allowCodeFunctionExecution | quote }}
  BRAINSTORE_ENABLED: "true"
  BRAINSTORE_DEFAULT: "force"
  BRAINSTORE_URL: "http://{{ .Values.brainstore.reader.service.name | default .Values.brainstore.reader.name }}.{{ .Values.global.namespace }}:{{ .Values.brainstore.reader.service.port }}"
  BRAINSTORE_FAST_READER_URL: "http://{{ .Values.brainstore.fastreader.service.name | default .Values.brainstore.fastreader.name }}.{{ .Values.global.namespace }}:{{ .Values.brainstore.fastreader.service.port }}"
  BRAINSTORE_FAST_READER_QUERY_SOURCES: {{ include "braintrust.fastReaderQuerySourcesCsv" . | quote }}
  BRAINSTORE_WRITER_URL: "http://{{ .Values.brainstore.writer.service.name | default .Values.brainstore.writer.name }}.{{ .Values.global.namespace }}:{{ .Values.brainstore.writer.service.port }}"
  BRAINSTORE_BACKFILL_DISABLE_HISTORICAL: {{ .Values.api.backfillDisableHistorical | quote }}
  BRAINSTORE_BACKFILL_DISABLE_NONHISTORICAL: {{ .Values.api.backfillDisableNonhistorical | quote }}
  CONTROL_PLANE_TELEMETRY: {{ .Values.global.controlPlaneTelemetry | quote }}
  BRAINSTORE_INSERT_ROW_REFS: "true"
  # Logs v2 table. Requires pg_partman extension (default enabled in our TF modules)
  INSERT_LOGS2: "true"
  ALLOW_INVALID_BASE64: {{ .Values.api.allowInvalidBase64 | default "false" | quote }}
  NODE_MEMORY_PERCENT: {{ .Values.api.nodeMemoryPercent | default "80" | quote }}
  {{- with (.Values.api.unsafeUrlRequestMode | default "" | toString | trim) }}
  BRAINTRUST_UNSAFE_URL_REQUEST_MODE: {{ . | quote }}
  {{- end }}
  {{- with (.Values.api.urlSecurityDnsServers | default "" | toString | trim) }}
  BRAINTRUST_URL_SECURITY_DNS_SERVERS: {{ . | quote }}
  {{- end }}
  {{- with (.Values.api.urlSecurityAllowCidrs | default "" | toString | trim) }}
  BRAINTRUST_URL_SECURITY_ALLOW_CIDRS: {{ . | quote }}
  {{- end }}
  {{- if .Values.brainstoreWalFooterVersion }}
  BRAINSTORE_WAL_FOOTER_VERSION: {{ .Values.brainstoreWalFooterVersion | quote }}
  {{- end }}
  {{- if .Values.skipPgForBrainstoreObjects }}
  SKIP_PG_FOR_BRAINSTORE_OBJECTS: {{ .Values.skipPgForBrainstoreObjects | quote }}
  {{- end }}
  {{- if or .Values.brainstoreWalFooterVersion .Values.skipPgForBrainstoreObjects }}
  BRAINSTORE_WAL_USE_EFFICIENT_FORMAT: "true"
  {{- end }}
  {{- if .Values.aiGateway.useGateway }}
  GATEWAY_URL: {{ include "braintrust.aiGatewayInternalUrl" . | quote }}
  {{- end }}
