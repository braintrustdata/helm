# Sample values for GKE Autopilot deployment

# Global configs
global:
  orgName: "<your Braintrust org name>"
  namespace: "braintrust"

# Cloud provider configuration
cloud: "google"

# Google Cloud specific configuration for Autopilot
google:
  mode: "autopilot"
  autopilotMachineFamily: "c4"

objectStorage:
  google:
    brainstoreBucket: "<your brainstore bucket name>"
    apiBucket: "<your api bucket name>"

# BTQL query.read audit logging (requires data plane v2.6.0+).
# Uncomment exactly one block to enable audit logging for specific orgs.
# Strict mode writes the audit row before returning results; best-effort
# writes asynchronously and logs failures. Setting both is a template error.
#
# btqlAuditLogsStrictOrgIds: ["<braintrust-org-uuid>"]
#
# btqlAuditLogsBestEffortOrgIds: ["<braintrust-org-uuid>"]

api:
  name: "braintrust-api"
  annotations:
    service:
      networking.gke.io/load-balancer-type: "Internal"
  replicas: 4
  # Alternatively, autoscale the API on CPU and event-loop metrics.
  # This is a Preview (Pre-GA) GKE feature requiring 1.35.1-gke.1396000 or later
  # and the prerequisites documented in the main values.yaml.
  # See api.autoscaling in the main values.yaml file for more details.
  # autoscaling:
  #   enabled: true
  #   minReplicas: 3
  #   maxReplicas: 50
  # Uncomment the following section to use a different image or tag from the version in the Helm release
  #image:
    #repository: public.ecr.aws/braintrust/standalone-api
    #tag: "<your image tag>"
  service:
    type: LoadBalancer
    port: 8000
    portName: http
  serviceAccount:
   name: "braintrust-api"
   googleServiceAccount: "<your Braintrust API Google service account>"
  # Native GCS authentication via Workload Identity. Set to true to use GCS natively instead of S3-compatible access.
  enableGcsAuth: false
  resources:
    requests:
      cpu: "4"
      memory: "4Gi"
    limits:
      cpu: "4"
      memory: "8Gi"
  extraEnvVars:
    # For S3-compatible GCS Storage, set the AWS_REGION environment variable to the region of your GCS bucket
    - name: AWS_REGION
      value: "us-central1"

# Brainstore configuration (split into reader and writer)
brainstore:
  serviceAccount:
    name: "brainstore"
    googleServiceAccount: "<your Braintrust Brainstore Google service account>"
  # Uncomment the following section to use a different image or tag from the version in the Helm release
  #image:
    #repository: public.ecr.aws/braintrust/brainstore
    #tag: "<your image tag>"
  # New deployments should use objectStorage as the locks backend. Existing deployments should remain on redis at this time.
  locksBackend: "objectStorage"

  # Brainstore Reader configuration
  reader:
    name: "brainstore-reader"
    replicas: 2
    service:
      name: ""
      type: ClusterIP
      port: 4000
      portName: http
    resources:
      requests:
        cpu: "16"
        memory: "32Gi"
      limits:
        cpu: "16"
        memory: "32Gi"
    cacheDir: "/mnt/tmp/brainstore"
    objectStoreCacheMemoryLimit: "1Gi"
    objectStoreCacheFileSize: "900Gi"
    verbose: true
    volume:
      size: "1000Gi"
    extraEnvVars:

  # Brainstore Fast Reader configuration
  fastreader:
    name: "brainstore-fastreader"
    replicas: 2
    service:
      name: ""
      type: ClusterIP
      port: 4000
      portName: http
    resources:
      requests:
        cpu: "16"
        memory: "32Gi"
      limits:
        cpu: "16"
        memory: "32Gi"
    cacheDir: "/mnt/tmp/brainstore"
    objectStoreCacheMemoryLimit: "1Gi"
    objectStoreCacheFileSize: "900Gi"
    verbose: true
    volume:
      size: "1000Gi"
    extraEnvVars:

  # Brainstore Writer configuration
  writer:
    name: "brainstore-writer"
    replicas: 1
    service:
      name: ""
      type: ClusterIP
      port: 4000
      portName: http
    resources:
      requests:
        cpu: "32"
        memory: "64Gi"
      limits:
        cpu: "32"
        memory: "64Gi"
    cacheDir: "/mnt/tmp/brainstore"
    objectStoreCacheMemoryLimit: "1Gi"
    objectStoreCacheFileSize: "900Gi"
    verbose: true
    volume:
      size: "1000Gi"
    extraEnvVars:
