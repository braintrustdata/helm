suite: test Brainstore Fast Reader deployment template
templates:
  - brainstore-fastreader-deployment.yaml
  - brainstore-fastreader-configmap.yaml
tests:
  - it: should render Brainstore Fast Reader deployment with default values
    template: brainstore-fastreader-deployment.yaml
    values:
      - __fixtures__/base-values.yaml
    release:
      namespace: "braintrust"
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: brainstore-fastreader
      - equal:
          path: spec.replicas
          value: 1
      - equal:
          path: spec.template.spec.containers[0].name
          value: brainstore-fastreader
      - equal:
          path: spec.template.spec.containers[0].image
          value: test/brainstore:v1.0.0
      - equal:
          path: spec.template.spec.containers[0].envFrom[0].configMapRef.name
          value: brainstore-fastreader

  - it: should include extraEnvVars when provided
    template: brainstore-fastreader-deployment.yaml
    values:
      - __fixtures__/base-values.yaml
    set:
      brainstore.fastreader.extraEnvVars:
        - name: CUSTOM_VAR
          value: "custom-value"
    release:
      namespace: "braintrust"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CUSTOM_VAR
            value: "custom-value"

  - it: should use explicit ephemeral-storage request for AWS
    template: brainstore-fastreader-deployment.yaml
    values:
      - __fixtures__/base-values.yaml
      - __fixtures__/aws-values.yaml
    set:
      brainstore.fastreader.ephemeralStorage.request: "101Gi"
    release:
      namespace: "braintrust"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests["ephemeral-storage"]
          value: "101Gi"

  - it: should not inject ephemeral-storage request for Azure
    template: brainstore-fastreader-deployment.yaml
    values:
      - __fixtures__/base-values.yaml
      - __fixtures__/azure-values.yaml
    release:
      namespace: "braintrust"
    asserts:
      - isNull:
          path: spec.template.spec.containers[0].resources.requests["ephemeral-storage"]

  - it: should not inject ephemeral-storage request for GKE Standard
    template: brainstore-fastreader-deployment.yaml
    values:
      - __fixtures__/base-values.yaml
      - __fixtures__/google-values.yaml
    set:
      google.mode: "standard"
      brainstore.fastreader.ephemeralStorage.request: "101Gi"
    release:
      namespace: "braintrust"
    asserts:
      - isNull:
          path: spec.template.spec.containers[0].resources.requests["ephemeral-storage"]

  - it: should mount tmp volume only when enabled
    template: brainstore-fastreader-deployment.yaml
    values:
      - __fixtures__/base-values.yaml
    set:
      brainstore.fastreader.tmpVolume.enabled: true
      brainstore.fastreader.tmpVolume.sizeLimit: "1Gi"
    release:
      namespace: "braintrust"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: tmp-volume
            mountPath: /tmp
      - equal:
          path: spec.template.spec.volumes[1].emptyDir.sizeLimit
          value: "1Gi"
